<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Budget Tracker E2E Reset</title>
</head>
<body>
  <pre id="reset-status">resetting</pre>
  <script>
    const DB_NAMES = ['BudgetTrackerDB', 'BudgetTrackerBackups'];

    function deleteDatabase(name) {
      return new Promise((resolve, reject) => {
        try {
          const request = indexedDB.deleteDatabase(name);
          request.onsuccess = () => resolve({ name, status: 'deleted' });
          request.onerror = () => reject(request.error || new Error('delete failed'));
          request.onblocked = () => reject(new Error(`delete blocked for ${name}`));
        } catch (error) {
          reject(error);
        }
      });
    }

    async function reset() {
      const statusEl = document.getElementById('reset-status');
      const params = new URLSearchParams(window.location.search);
      const skipOnboarding = params.get('skipOnboarding') === '1';

      localStorage.clear();
      sessionStorage.clear();

      localStorage.setItem(
        'budget_tracker_migration_status',
        JSON.stringify({ completed: true, timestamp: Date.now(), version: '2.7', itemCount: 0 })
      );

      if (skipOnboarding) {
        localStorage.setItem(
          'budget_tracker_onboarding',
          JSON.stringify({ completed: true, step: 6 })
        );
      }

      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map((key) => caches.delete(key)));
      }

      const results = [];
      for (const dbName of DB_NAMES) {
        results.push(await deleteDatabase(dbName));
      }

      document.body.dataset.reset = 'done';
      statusEl.textContent = JSON.stringify({ ok: true, skipOnboarding, results });
    }

    reset().catch((error) => {
      document.body.dataset.reset = 'error';
      document.getElementById('reset-status').textContent = JSON.stringify({
        ok: false,
        error: error instanceof Error ? error.message : String(error)
      });
    });
  </script>
</body>
</html>
